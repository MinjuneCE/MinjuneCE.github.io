<style>/* ============ TOKENS ============ */
:root {
  --bg: #ededea;
  --bg-alt: #e3e3df;
  --paper: #f6f5f2;
  --ink: #111;
  --ink-2: #2a2a2a;
  --mute: #6a6a6a;
  --rule: rgba(0,0,0,0.12);
  --rule-strong: rgba(0,0,0,0.6);
  --accent: #d94f1f;
  --accent-soft: #f5dccf;
  --ok: #2a8f4f;

  --sans: 'Inter', 'Helvetica Neue', Helvetica, system-ui, sans-serif;
  --display: 'Inter', 'Helvetica Neue', Helvetica, system-ui, sans-serif;
  --mono: 'Geist Mono', 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace;

  --pad-x: clamp(20px, 5vw, 64px);
  --max: 1440px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
html { scroll-behavior: smooth; }
body { overflow-x: hidden; }

a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }

::selection { background: var(--accent); color: #fff; }

/* ============ NAV ============ */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; justify-content: space-between; align-items: center;
  padding: 18px var(--pad-x);
  background: rgba(237,237,234,0.78);
  backdrop-filter: saturate(140%) blur(14px);
  border-bottom: 1px solid var(--rule);
  font-family: var(--mono); font-size: 12px; letter-spacing: -0.005em;
}
.nav-brand { display: flex; align-items: center; gap: 10px; font-weight: 500; color: var(--ink); }
.nav-brand .mark {
  width: 22px; height: 22px; border-radius: 50%; background: var(--ink);
  position: relative; display: inline-block;
}
.nav-brand .mark::after {
  content: ''; position: absolute; inset: 4px;
  border-radius: 50%; background: var(--accent);
  transform-origin: center; animation: orbit 8s linear infinite;
}
@keyframes orbit {
  0% { transform: translate(0,0); }
  25% { transform: translate(2px, -2px); }
  50% { transform: translate(0, 0); }
  75% { transform: translate(-2px, 2px); }
  100% { transform: translate(0,0); }
}
.nav-brand .sep { color: var(--mute); margin: 0 2px; }
.nav-brand .role { color: var(--mute); font-weight: 400; }
.nav-links { display: flex; gap: 6px; align-items: center; }
.nav-links a {
  padding: 8px 12px; border-radius: 999px; transition: all .2s ease;
  color: var(--mute); position: relative;
}
.nav-links a:hover { color: var(--ink); }
.nav-links a.active { color: var(--ink); background: rgba(17,17,17,0.06); }
.nav-links a.active::before {
  content: ''; position: absolute; left: 12px; right: 12px; bottom: 4px;
  height: 1px; background: var(--accent);
}
.nav-right { display: flex; align-items: center; gap: 14px; }
.nav-time { color: var(--mute); }
.nav-cta {
  padding: 8px 14px; border: 1px solid var(--ink); border-radius: 999px;
  color: var(--ink); transition: all .2s ease;
}
.nav-cta:hover { background: var(--ink); color: var(--bg); }

.scroll-progress {
  position: fixed; top: 0; left: 0; height: 2px;
  background: var(--accent); z-index: 200; width: 0%; transition: width .1s linear;
}

/* ============ COMMON ============ */
section {
  position: relative;
  padding: 96px var(--pad-x);
  scroll-margin-top: 60px;
}
.container { max-width: var(--max); margin: 0 auto; width: 100%; }
.grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px; }

.section-header {
  display: flex; justify-content: space-between; align-items: baseline;
  padding-bottom: 18px; border-bottom: 1px solid var(--rule-strong);
  margin-bottom: 56px;
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.04em;
  color: var(--mute);
}
.section-header .left { color: var(--ink); font-weight: 500; }
.section-header .right { display: flex; gap: 24px; }
.section-header .right span { display: inline-flex; gap: 6px; }
.section-header .right b { color: var(--ink); font-weight: 500; }

.reveal { opacity: 0; transform: translateY(24px); transition: opacity .8s cubic-bezier(.2,.7,.2,1), transform .8s cubic-bezier(.2,.7,.2,1); }
.reveal.in { opacity: 1; transform: none; }
.reveal.d1 { transition-delay: 0.08s; }
.reveal.d2 { transition-delay: 0.16s; }
.reveal.d3 { transition-delay: 0.24s; }
.reveal.d4 { transition-delay: 0.32s; }

/* ============ HERO ============ */
.hero { padding-top: 140px; padding-bottom: 80px; min-height: 100vh; display: flex; align-items: center; }
.hero-content { width: 100%; }

.hero-top {
  display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px;
  padding-bottom: 22px; border-bottom: 1px solid var(--ink);
  font-family: var(--mono); font-size: 12px;
}
.hero-top > div:nth-child(1) { grid-column: span 4; font-weight: 500; }
.hero-top > div:nth-child(2) { grid-column: span 4; color: var(--mute); }
.hero-top > div:nth-child(3) { grid-column: span 4; text-align: right; color: var(--mute); }

.hero-main { display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px; margin-top: 64px; }
.hero-num { grid-column: span 2; font-family: var(--mono); font-size: 12px; color: var(--mute); }
.hero-num div { padding: 4px 0; border-bottom: 1px solid var(--rule); }
.hero-num div.cur { color: var(--ink); font-weight: 500; }
.hero-num div.cur::before { content: '→ '; color: var(--accent); }

.hero-headline-wrap { grid-column: span 10; }
.hero-headline {
  font-size: clamp(60px, 12vw, 196px);
  font-weight: 500; line-height: 0.88; letter-spacing: -0.055em;
  margin: 0; color: var(--ink);
}
.hero-headline .line { display: block; overflow: hidden; padding-bottom: 0.06em; }
.hero-headline .line > span {
  display: inline-block;
  transform: translateY(110%);
  animation: lineRise 1.1s cubic-bezier(.2,.7,.2,1) forwards;
}
.hero-headline .line:nth-child(1) > span { animation-delay: 0.1s; }
.hero-headline .line:nth-child(2) > span { animation-delay: 0.22s; }
.hero-headline .line:nth-child(3) > span { animation-delay: 0.4s; }
.hero-headline .accent { color: var(--accent); font-style: italic; font-weight: 400; }
.hero-headline .sub {
  font-size: 0.16em; font-weight: 400; color: var(--mute);
  letter-spacing: -0.01em; display: inline-block; margin-top: 0.7em;
  font-family: var(--mono); letter-spacing: 0;
}
@keyframes lineRise { to { transform: translateY(0); } }

.hero-mid {
  display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px;
  margin-top: 80px; padding-top: 28px; border-top: 1px solid var(--rule);
}
.hero-role { grid-column: span 5; font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase; }
.hero-role .label { color: var(--mute); margin-right: 12px; font-weight: 400; }
.hero-role b { font-weight: 500; }
.hero-slogan { grid-column: span 5; font-size: 17px; line-height: 1.55; color: #333; max-width: 520px; }
.hero-status {
  grid-column: span 2; display: flex; align-items: center; gap: 10px;
  justify-content: flex-end; font-size: 12px; font-family: var(--mono);
}
.hero-status .dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--ok);
  box-shadow: 0 0 0 4px rgba(42,143,79,0.15);
  animation: pulseDot 2.4s ease-in-out infinite;
}
@keyframes pulseDot {
  0%, 100% { box-shadow: 0 0 0 4px rgba(42,143,79,0.15); }
  50% { box-shadow: 0 0 0 8px rgba(42,143,79,0.03); }
}

.hero-bottom { display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px; margin-top: 64px; align-items: end; }
.hero-ctas { grid-column: span 6; display: flex; gap: 12px; flex-wrap: wrap; }
.btn {
  font-family: var(--sans); font-size: 14px; padding: 18px 28px;
  cursor: pointer; transition: all .25s ease; letter-spacing: -0.01em;
  text-decoration: none; display: inline-flex; align-items: center; gap: 10px;
  border-radius: 0; font-weight: 500; border: 1px solid var(--ink);
}
.btn.primary { background: var(--ink); color: var(--bg); }
.btn.primary:hover { background: var(--accent); border-color: var(--accent); }
.btn.ghost { background: transparent; color: var(--ink); }
.btn.ghost:hover { background: var(--ink); color: var(--bg); }
.btn .arr { transition: transform .25s ease; display: inline-block; }
.btn:hover .arr { transform: translateX(4px); }

.hero-counters {
  grid-column: span 6;
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px;
  font-family: var(--mono); font-size: 11px; color: var(--mute);
  letter-spacing: 0.06em; text-transform: uppercase;
}
.hero-counters > div { border-top: 1px solid var(--ink); padding-top: 12px; }
.hero-counters b {
  display: block; font-family: var(--sans); font-size: 32px;
  font-weight: 600; color: var(--ink); letter-spacing: -0.03em;
  margin-bottom: 4px; text-transform: none;
}

/* ============ ABOUT ============ */
.about { background: var(--bg); }
.about-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px; }
.about-headline { grid-column: span 12; margin-bottom: 56px; }
.about-headline h2 {
  font-size: clamp(48px, 8vw, 132px);
  font-weight: 500; line-height: 0.92; letter-spacing: -0.045em;
  margin: 0;
}
.about-headline h2 .ink-em { color: var(--accent); font-style: italic; font-weight: 400; }

.about-cols { display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px; }
.about-prose { grid-column: span 7; }
.about-prose p {
  font-size: 17px; line-height: 1.65; color: #222; margin: 0 0 22px;
  max-width: 640px; text-wrap: pretty;
}
.about-prose p:first-child { font-size: 19px; color: #111; }
.about-prose .kw { color: var(--accent); font-style: italic; }
.about-prose strong { font-weight: 600; color: var(--ink); }

.about-terminal { grid-column: span 5; }
.terminal {
  background: #0e0e0e; color: #d4d4d4;
  border-radius: 6px; overflow: hidden;
  font-family: var(--mono); font-size: 13px;
  box-shadow: 0 30px 60px -20px rgba(0,0,0,0.25), 0 1px 0 rgba(255,255,255,0.04) inset;
}
.terminal-bar {
  display: flex; align-items: center; gap: 8px; padding: 12px 16px;
  border-bottom: 1px solid #1c1c1c; background: #161616;
  font-size: 11px; color: #777;
}
.terminal-bar .dots { display: flex; gap: 6px; }
.terminal-bar .dots span { width: 11px; height: 11px; border-radius: 50%; display: block; }
.terminal-body { padding: 22px 22px 26px; min-height: 280px; }
.terminal-line { padding: 3px 0; }
.terminal-line .prompt { color: #d94f1f; margin-right: 8px; }
.terminal-line .out { color: #b8b8b8; }
.terminal-line .green { color: #6fbf73; }
.terminal-line .blue { color: #7aa7e6; }
.terminal-line .gray { color: #707070; }
.terminal-cursor { display: inline-block; width: 8px; height: 1em; background: #d94f1f; vertical-align: -2px; margin-left: 4px; animation: blink 1s steps(2) infinite; }
@keyframes blink { 50% { opacity: 0; } }

.about-stats {
  grid-column: span 12; margin-top: 64px;
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;
  border-top: 1px solid var(--ink);
}
.about-stat { padding: 28px 24px 24px; border-right: 1px solid var(--rule); position: relative; }
.about-stat:last-child { border-right: none; }
.about-stat .n {
  font-size: clamp(36px, 4.5vw, 64px); font-weight: 500;
  letter-spacing: -0.04em; line-height: 1; color: var(--ink); margin: 0 0 12px;
}
.about-stat .l {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--mute);
}
.about-stat.featured .n { color: var(--accent); }

/* ============ EXPERIENCE ============ */
.experience { background: var(--bg-alt); border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); }
.exp-company {
  display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px;
  padding-bottom: 56px; border-bottom: 1px solid var(--rule-strong); margin-bottom: 64px;
}
.exp-company-meta { grid-column: span 4; }
.exp-company-meta .period {
  font-family: var(--mono); font-size: 13px; color: var(--mute);
  border-left: 2px solid var(--accent); padding-left: 12px;
}
.exp-company-meta h3 {
  font-size: clamp(28px, 3.5vw, 44px); font-weight: 500;
  letter-spacing: -0.025em; margin: 18px 0 8px; line-height: 1.05;
}
.exp-company-meta .role-line {
  font-family: var(--mono); font-size: 12px; color: var(--mute); letter-spacing: 0.04em;
}
.exp-company-meta .role-line b { color: var(--ink); font-weight: 500; }
.exp-company-meta .role-line .promo {
  display: inline-block; margin-left: 8px; padding: 2px 8px; border-radius: 999px;
  background: var(--accent); color: #fff; font-size: 10px; letter-spacing: 0.05em;
}
.exp-company-desc { grid-column: 6 / -1; font-size: 16px; line-height: 1.65; color: #333; max-width: 700px; }
.exp-company-desc p { margin: 0 0 14px; }

.exp-section-label {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--mute); margin-bottom: 24px;
  display: flex; align-items: center; gap: 12px;
}
.exp-section-label::after { content: ''; flex: 1; height: 1px; background: var(--rule); }
.exp-section-label .count { color: var(--ink); font-weight: 500; }

.starred-list { display: flex; flex-direction: column; gap: 14px; margin-bottom: 64px; }
.starred {
  display: grid; grid-template-columns: 80px 1fr; gap: 0;
  background: var(--paper); border: 1px solid var(--rule);
  transition: all .3s cubic-bezier(.2,.7,.2,1); position: relative; overflow: hidden;
}
.starred:hover { border-color: var(--ink); transform: translateY(-2px); box-shadow: 0 16px 40px -16px rgba(0,0,0,0.18); }
.starred:hover .star { color: var(--ink); }
.starred:hover .star::before { transform: scaleY(1); }
.starred .star {
  position: relative;
  display: flex; align-items: flex-start; justify-content: center;
  padding: 28px 0 0; font-size: 22px; color: var(--mute);
  border-right: 1px solid var(--rule);
  transition: color .3s ease;
}
.starred .star::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 2px; background: var(--accent);
  transform: scaleY(0); transform-origin: top;
  transition: transform .5s cubic-bezier(.2,.7,.2,1);
}
.starred .body { padding: 24px 28px 26px; }
.starred .head {
  display: flex; flex-wrap: wrap; gap: 8px 14px; align-items: baseline;
  margin-bottom: 14px;
}
.starred .head .num {
  font-family: var(--mono); font-size: 12px; color: var(--mute); font-weight: 500;
}
.starred .head h4 {
  font-size: clamp(18px, 1.7vw, 22px); font-weight: 500;
  letter-spacing: -0.015em; margin: 0; line-height: 1.25; flex: 1; min-width: 280px;
}
.starred .head .period {
  font-family: var(--mono); font-size: 12px; color: var(--ink);
  padding: 3px 10px; background: var(--bg); border: 1px solid var(--rule);
}
.starred .head .status {
  font-family: var(--mono); font-size: 11px; color: var(--accent);
  padding: 3px 10px; background: var(--accent-soft); letter-spacing: 0.04em;
}
.starred .role-tag {
  font-family: var(--mono); font-size: 12px; color: var(--mute);
  margin-bottom: 14px; letter-spacing: -0.005em;
}
.starred .role-tag b { color: var(--ink); font-weight: 500; }
.starred ul {
  list-style: none; padding: 0; margin: 0 0 16px;
  display: flex; flex-direction: column; gap: 6px;
}
.starred ul li {
  font-size: 14.5px; line-height: 1.55; color: #2a2a2a;
  padding-left: 18px; position: relative;
}
.starred ul li::before {
  content: ''; position: absolute; left: 0; top: 0.62em;
  width: 8px; height: 1px; background: var(--ink);
}
.starred ul li code {
  font-family: var(--mono); font-size: 0.9em; color: var(--accent);
  background: transparent; padding: 0 2px;
}
.starred .stack { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 16px; padding-top: 16px; border-top: 1px dashed var(--rule); }
.tag {
  font-family: var(--mono); font-size: 11px; padding: 4px 10px;
  background: var(--bg); border: 1px solid var(--rule); color: #333;
  letter-spacing: -0.005em; transition: all .2s ease;
}
.tag:hover { background: var(--ink); color: var(--bg); border-color: var(--ink); }

.minor-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-bottom: 56px; }
.minor {
  padding: 20px 22px; background: var(--paper); border: 1px solid var(--rule);
  transition: all .25s ease;
}
.minor:hover { border-color: var(--ink); }
.minor .head {
  display: flex; justify-content: space-between; gap: 12px;
  align-items: baseline; margin-bottom: 6px;
}
.minor .head .num { font-family: var(--mono); font-size: 11px; color: var(--mute); }
.minor .head .period { font-family: var(--mono); font-size: 11px; color: var(--mute); }
.minor h4 {
  font-size: 16px; font-weight: 500; letter-spacing: -0.012em;
  margin: 0 0 10px; line-height: 1.3;
}
.minor p { font-size: 14px; line-height: 1.55; color: #333; margin: 0 0 12px; }
.minor .stack { display: flex; flex-wrap: wrap; gap: 4px; }
.minor .stack .tag { padding: 2px 8px; font-size: 10.5px; }

.exp-extra {
  margin-top: 24px; padding: 28px;
  background: var(--bg); border: 1px solid var(--rule);
  display: grid; grid-template-columns: auto 1fr; gap: 28px; align-items: center;
}
.exp-extra .label {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--mute);
}
.exp-extra ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 4px; }
.exp-extra ul li { font-family: var(--mono); font-size: 13px; color: var(--ink); }
.exp-extra ul li .yr { color: var(--mute); margin-left: 10px; }

/* ============ PROJECTS ============ */
.projects { background: var(--bg); }
.proj-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
.proj-card {
  background: var(--paper); border: 1px solid var(--rule); padding: 32px;
  display: flex; flex-direction: column;
  transition: all .3s cubic-bezier(.2,.7,.2,1);
  position: relative; overflow: hidden;
}
.proj-card::before {
  content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
  background: var(--accent); transform: scaleX(0); transform-origin: left;
  transition: transform .5s cubic-bezier(.2,.7,.2,1);
}
.proj-card:hover { border-color: var(--ink); transform: translateY(-3px); box-shadow: 0 24px 50px -20px rgba(0,0,0,0.15); }
.proj-card:hover::before { transform: scaleX(1); }
.proj-card .cat {
  font-family: var(--mono); font-size: 11px; color: var(--accent);
  letter-spacing: 0.14em; text-transform: uppercase; font-weight: 500;
  display: flex; justify-content: space-between;
}
.proj-card .cat .pno { color: var(--mute); font-weight: 400; }
.proj-card h3 {
  font-size: clamp(22px, 2.2vw, 30px); font-weight: 500;
  letter-spacing: -0.022em; line-height: 1.2; margin: 18px 0 28px;
}
.proj-block { margin-bottom: 18px; }
.proj-block .blabel {
  font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--mute); margin-bottom: 6px;
  display: flex; align-items: center; gap: 8px;
}
.proj-block .blabel::before { content: ''; width: 16px; height: 1px; background: var(--accent); }
.proj-block p { font-size: 14.5px; line-height: 1.6; color: #2a2a2a; margin: 0; }
.proj-block ul { list-style: none; padding: 0; margin: 4px 0 0; display: flex; flex-direction: column; gap: 4px; }
.proj-block ul li { font-size: 14px; line-height: 1.55; color: #2a2a2a; padding-left: 14px; position: relative; }
.proj-block ul li::before { content: '·'; position: absolute; left: 4px; top: 0; color: var(--accent); font-weight: 700; }
.proj-block code { font-family: var(--mono); color: var(--accent); font-size: 0.92em; }
.proj-block.alt { padding: 14px 16px; margin-bottom: 18px; background: rgba(17,17,17,0.025); border-left: 2px solid var(--accent); }
.proj-block.alt .blabel { margin-bottom: 8px; }
.proj-block.alt ul li { font-size: 13.5px; }
.proj-card .stack { margin-top: auto; padding-top: 20px; border-top: 1px dashed var(--rule); display: flex; flex-wrap: wrap; gap: 6px; }

/* ============ CASE STUDY ============ */
.case { background: var(--bg-alt); border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); }
.case-intro { margin-bottom: 52px; }
.case-cat { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.14em; text-transform: uppercase; font-weight: 500; }
.case-intro h3 { font-size: clamp(28px, 4vw, 52px); font-weight: 500; letter-spacing: -0.035em; line-height: 1.08; margin: 16px 0 20px; }
.case-lead { font-size: 17px; line-height: 1.62; color: #333; max-width: 720px; }
.case-lead strong { font-weight: 600; color: var(--ink); }
.case-meta { display: flex; flex-wrap: wrap; gap: 14px 40px; margin-top: 30px; padding-top: 22px; border-top: 1px solid var(--rule); font-family: var(--mono); font-size: 12px; }
.case-meta > div { display: flex; flex-direction: column; gap: 5px; }
.case-meta .k { color: var(--mute); letter-spacing: 0.08em; text-transform: uppercase; font-size: 10px; }
.case-meta .v { color: var(--ink); }

.case-section-label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--mute); margin: 0 0 22px; display: flex; align-items: center; gap: 12px; }
.case-section-label::after { content: ''; flex: 1; height: 1px; background: var(--rule); }

.case-trace { display: flex; flex-direction: column; margin-bottom: 56px; }
.case-beat { display: grid; grid-template-columns: 60px 1fr; gap: 20px; padding: 22px 0; border-top: 1px solid var(--rule); }
.case-beat:last-child { border-bottom: 1px solid var(--rule); }
.case-beat .bn { font-family: var(--mono); font-size: 13px; color: var(--accent); font-weight: 500; padding-top: 2px; }
.case-beat .bbody h4 { font-size: 16px; font-weight: 600; letter-spacing: -0.012em; margin: 0 0 8px; color: var(--ink); }
.case-beat .bbody p { font-size: 14.5px; line-height: 1.62; color: #2a2a2a; margin: 0; }
.case-beat .bbody p + p { margin-top: 8px; }
.case-beat .bbody code { font-family: var(--mono); color: var(--accent); font-size: 0.9em; }
.case-beat .bbody strong { font-weight: 600; color: var(--ink); }

.case-diagram { background: #0e0e0e; border-radius: 8px; padding: 26px; margin-bottom: 14px; overflow-x: auto; box-shadow: 0 28px 56px -28px rgba(0,0,0,0.35); }
.case-diagram svg { width: 100%; height: auto; min-width: 640px; display: block; }
.case-fig { font-family: var(--mono); font-size: 11.5px; color: var(--mute); margin: 0 0 56px; line-height: 1.5; }
.case-fig code { color: var(--accent); }

.case-code { background: #0e0e0e; border-radius: 8px; overflow: hidden; margin-bottom: 14px; box-shadow: 0 28px 56px -28px rgba(0,0,0,0.35); }
.case-code .cbar { display: flex; align-items: center; padding: 10px 18px; background: #161616; border-bottom: 1px solid #1c1c1c; font-family: var(--mono); font-size: 11px; color: #8a8a8a; letter-spacing: 0.02em; }
.case-code pre { margin: 0; padding: 20px 22px; overflow-x: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; color: #d4d4d4; tab-size: 4; white-space: pre; }
.case-note-inline { font-family: var(--mono); font-size: 11px; color: var(--mute); margin: 2px 0 56px; }

.case-qa-grid { display: flex; flex-direction: column; }
.case-qa { padding: 20px 0; border-top: 1px solid var(--rule); }
.case-qa:last-child { border-bottom: 1px solid var(--rule); }
.case-qa .q { font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 8px; display: flex; gap: 10px; align-items: baseline; }
.case-qa .q .qm { color: var(--accent); font-family: var(--mono); font-size: 13px; }
.case-qa .a { font-size: 14px; line-height: 1.62; color: #2a2a2a; margin: 0; padding-left: 23px; }
.case-qa .a code { font-family: var(--mono); color: var(--accent); font-size: 0.9em; }
.case-qa .a strong { font-weight: 600; color: var(--ink); }

/* ============ SKILLS ============ */
.skills { background: var(--bg-alt); border-top: 1px solid var(--rule); }
.skills-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 0; border-top: 1px solid var(--ink); }
.skill-group {
  grid-column: span 6;
  padding: 32px 28px; border-right: 1px solid var(--rule); border-bottom: 1px solid var(--rule);
  background: transparent;
  transition: background .3s ease;
}
.skill-group:nth-child(even) { border-right: none; }
.skill-group:hover { background: var(--paper); }
.skill-group .gh {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 18px;
}
.skill-group .gh h4 {
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--ink); margin: 0; font-weight: 500;
}
.skill-group .gh .cnt { font-family: var(--mono); font-size: 11px; color: var(--mute); }
.skill-group .tags { display: flex; flex-wrap: wrap; gap: 8px; }

.skill-group.ai {
  grid-column: 1 / -1;
  background: var(--ink); color: var(--bg);
  border-right: none;
  position: relative; overflow: hidden;
}
.skill-group.ai::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at 80% 20%, rgba(217,79,31,0.25), transparent 60%);
  pointer-events: none;
}
.skill-group.ai .gh { padding-bottom: 18px; border-bottom: 1px solid rgba(255,255,255,0.12); position: relative; }
.skill-group.ai .gh h4 { color: var(--accent); }
.skill-group.ai .gh .cnt { color: rgba(255,255,255,0.5); }
.skill-group.ai .gh .star-row { display: flex; gap: 4px; align-items: center; font-family: var(--mono); font-size: 11px; color: var(--accent); margin-top: 8px; letter-spacing: 0.12em; }
.skill-group.ai .ai-h {
  position: relative; font-size: clamp(22px, 2.4vw, 32px); font-weight: 500;
  letter-spacing: -0.025em; margin: 18px 0 22px; line-height: 1.2;
}
.skill-group.ai .ai-h em { color: var(--accent); font-style: italic; font-weight: 400; }
.skill-group.ai .tags { position: relative; }
.skill-group.ai .tag {
  background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.18); color: #f3ede9;
  padding: 6px 14px; font-size: 12px;
}
.skill-group.ai .tag:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ============ EDUCATION ============ */
.education { background: var(--bg); }
.edu-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px; align-items: start; }
.edu-school {
  grid-column: span 7;
  padding: 32px 0;
  border-top: 1px solid var(--ink); border-bottom: 1px solid var(--rule);
}
.edu-school .period {
  font-family: var(--mono); font-size: 13px; color: var(--mute); margin-bottom: 12px;
}
.edu-school .period b { color: var(--accent); }
.edu-school h3 {
  font-size: clamp(26px, 3vw, 38px); font-weight: 500;
  letter-spacing: -0.025em; margin: 0 0 8px; line-height: 1.15;
}
.edu-school .dept { font-family: var(--mono); font-size: 13px; color: var(--ink); }
.edu-school .deg { color: var(--mute); margin-left: 6px; }

.edu-certs { grid-column: 9 / -1; }
.edu-certs .label {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--mute); margin-bottom: 16px;
}
.edu-certs .list { display: flex; flex-wrap: wrap; gap: 8px; }
.edu-certs .tag { padding: 6px 12px; font-size: 12px; background: var(--paper); }

/* ============ CONTACT ============ */
.contact { background: var(--ink); color: var(--bg); padding: 140px var(--pad-x) 80px; }
.contact .section-header { border-bottom-color: rgba(237,237,234,0.25); color: rgba(237,237,234,0.6); }
.contact .section-header .left { color: var(--bg); }
.contact .section-header .right b { color: var(--bg); }
.contact-prompt {
  font-family: var(--mono); font-size: 14px; color: var(--accent);
  margin-bottom: 32px; letter-spacing: 0.04em;
}
.contact-prompt::before { content: '> '; }

.contact-email-wrap {
  position: relative; display: block; padding: 32px 0;
  border-top: 1px solid rgba(237,237,234,0.18);
  border-bottom: 1px solid rgba(237,237,234,0.18);
  text-decoration: none; cursor: pointer; transition: all .3s ease;
  user-select: none;
}
.contact-email-wrap:hover { border-top-color: var(--accent); border-bottom-color: var(--accent); }
.contact-email {
  font-size: clamp(36px, 7vw, 100px); font-weight: 500;
  letter-spacing: -0.045em; line-height: 1; color: var(--bg);
  display: flex; align-items: center; gap: 24px; flex-wrap: wrap;
}
.contact-email .arr {
  display: inline-flex; align-items: center; justify-content: center;
  width: 0.9em; height: 0.9em; border-radius: 50%;
  border: 1px solid var(--bg); font-size: 0.4em; flex-shrink: 0;
  transition: all .3s ease;
}
.contact-email-wrap:hover .arr { background: var(--accent); border-color: var(--accent); transform: rotate(-45deg); }
.contact-copy-tip {
  position: absolute; top: 16px; right: 0;
  font-family: var(--mono); font-size: 11px; color: var(--mute);
  letter-spacing: 0.04em; opacity: 0.7;
}
.contact-copy-tip.ok { color: var(--accent); opacity: 1; }

.contact-links { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 36px; }
.contact-link {
  display: flex; flex-direction: column; gap: 5px;
  padding: 16px 20px; min-width: 220px;
  border: 1px solid rgba(237,237,234,0.18);
  font-family: var(--mono); transition: all .25s ease;
}
.contact-link:hover { border-color: var(--accent); background: rgba(217,79,31,0.07); }
.contact-link .k { font-size: 10.5px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(237,237,234,0.5); }
.contact-link .v { font-size: 14px; color: var(--bg); display: flex; align-items: center; gap: 8px; }
.contact-link .v .arr { color: var(--accent); }

.contact-meta {
  display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px;
  margin-top: 48px; padding-top: 24px;
  border-top: 1px solid rgba(237,237,234,0.12);
  font-family: var(--mono); font-size: 12px; color: rgba(237,237,234,0.5);
}
.contact-meta > div { display: flex; flex-direction: column; gap: 6px; }
.contact-meta > div:nth-child(1) { grid-column: span 3; }
.contact-meta > div:nth-child(2) { grid-column: span 3; }
.contact-meta > div:nth-child(3) { grid-column: span 3; }
.contact-meta > div:nth-child(4) { grid-column: span 3; text-align: right; }
.contact-meta b { color: var(--bg); font-weight: 500; }

.footer {
  padding: 32px var(--pad-x); background: var(--ink); color: rgba(237,237,234,0.5);
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em;
  display: flex; justify-content: space-between; align-items: center;
  border-top: 1px solid rgba(237,237,234,0.08);
}

/* ============ RESPONSIVE ============ */
@media (max-width: 1024px) {
  .nav-links { display: none; }
  .hero-num { display: none; }
  .hero-headline-wrap { grid-column: span 12; }
  .hero-mid > * { grid-column: span 12 !important; justify-content: flex-start !important; }
  .hero-bottom > * { grid-column: span 12 !important; }
  .exp-company-meta, .exp-company-desc { grid-column: span 12; }
  .proj-grid { grid-template-columns: 1fr; }
  .skill-group { grid-column: span 12; border-right: none; }
  .edu-school, .edu-certs { grid-column: span 12; }
  .about-prose, .about-terminal { grid-column: span 12; }
  .about-stats { grid-template-columns: repeat(2, 1fr); }
  .about-stat:nth-child(2) { border-right: none; }
  .about-stat:nth-child(1), .about-stat:nth-child(2) { border-bottom: 1px solid var(--rule); }
  .contact-meta > div { grid-column: span 6 !important; text-align: left !important; }
  .minor-list { grid-template-columns: 1fr; }
  .case-beat { grid-template-columns: 1fr; gap: 6px; }
  .case-beat .bn { padding-top: 0; }
}
@media (max-width: 600px) {
  .nav-time, .nav-cta { display: none; }
  .hero-top > div { grid-column: span 12 !important; text-align: left !important; }
  .starred { grid-template-columns: 1fr; }
  .starred .star { border-right: none; border-bottom: 1px solid var(--rule); padding: 16px 0; }
  .about-stats { grid-template-columns: 1fr; }
  .about-stat { border-right: none !important; border-bottom: 1px solid var(--rule); }
}
</style>
</head>
